name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish sample
        run: dotnet publish samples/ImageCropper.Sample/ImageCropper.Sample.csproj -c Release -o published /p:GHPages=true /p:BaseHref=/ImageCropper/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: published/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
