name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore ImageCropper.slnx
      - name: Build
        run: dotnet build ImageCropper.slnx -c Release --no-restore
      - name: Test
        run: dotnet test ImageCropper.slnx -c Release --no-build
