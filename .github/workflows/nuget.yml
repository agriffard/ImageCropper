name: NuGet Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore src/ImageCropper/ImageCropper.csproj
      - name: Pack
        run: dotnet pack src/ImageCropper/ImageCropper.csproj -c Release -o artifacts --no-restore
      - name: Push to NuGet
        run: dotnet nuget push artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
